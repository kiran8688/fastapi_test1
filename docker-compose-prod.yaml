version: '3.14'
services:
  postgres:
    image: postgres:18-alpine
    container_name: fastapi1_postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: kiran8688/fastapi1
    container_name: fastapi1_api
    restart: always
    depends_on:
      - postgres
    ports:
      - "80:8000"
    # volumes: # its not required for production
    #   - ./:/usr/src/app:ro # its not required for production
    # command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000" # its not required for production
    # env_file:
    #   - ./.env
    environment:
      - DATABASE_HOSTNAME=${DATABASE_HOSTNAME}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}

volumes:
  postgres_data:
